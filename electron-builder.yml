appId: com.eugene.eugent
productName: Eugent
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asar: true
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
dmg:
  window:
    width: 540
    height: 380
